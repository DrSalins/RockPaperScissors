<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/0f294bf505.js"
      crossorigin="anonymous"
    ></script>
    <title>&#169; Rock,Paper,Scissors</title>
  </head>
  <body>
    <div class="InstructionBox">
      <h1>Welcome To Rock , Paper , Scissors</h1>
      <div class="icons">
        <i class="fa-solid fa-gem fa-4x"></i>
        <i class="fa-solid fa-toilet-paper fa-4x"></i>
        <i class="fa-solid fa-hand-scissors fa-4x"></i>
      </div>
      <div class="instructions">
        <p style="color: white">
          Hello Everyone! Welcome!!. In this game, there are two players.
          <br />It's between YOU and the Computer! <br />The Computer and YOU
          can pick from Rock, Paper, Scissors and then battle it out.<br />
          There are three outcomes, either WIN, LOSE or DRAW!
        </p>
        <span class="userText"></span>
      </div>
    </div>
    <div class="buttonDesign">
      <button class="button-54" role="button">Click Here</button>
    </div>
    <script src="app.js"></script>
  </body>
</html>
